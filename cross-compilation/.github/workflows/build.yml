name: Cross-Compile Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential mingw-w64 wine wine64 wine32
    
    - name: Check compilers
      run: make info
    
    - name: Build for Linux
      run: make linux
    
    - name: Build for Windows
      run: make windows
    
    - name: List artifacts
      run: ls -lh bin/
    
    - name: Run Linux tests
      run: make test-linux
    
    - name: Run Windows tests with Wine
      run: wine bin/test-win64.exe || true
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: binaries-${{ github.run_number }}
        path: bin/
        retention-days: 30

  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc
    
    - name: Run comprehensive tests
      run: |
        chmod +x scripts/run-tests.sh
        ./scripts/run-tests.sh
